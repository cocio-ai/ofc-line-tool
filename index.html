<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗向けLINE発信ツール（綿谷OFC版）</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #008D62;
            --primary-hover: #006B4A;
            --bg: #F0F4F8;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        body { font-family: 'Noto Sans JP', sans-serif; padding: 20px; background-color: var(--bg); color: var(--text-main); line-height: 1.5; margin: 0; }
        .container { display: flex; flex-wrap: wrap; gap: 24px; max-width: 1200px; margin: auto; align-items: flex-start; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .form-section { flex: 1.5; min-width: 400px; }
        .preview-section { flex: 1; min-width: 350px; position: sticky; top: 20px; }

        h2 { font-size: 1.25rem; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-top: 0; display: flex; align-items: center; }
        .section-title { font-size: 1rem; font-weight: 700; margin: 24px 0 12px 0; border-left: 4px solid var(--primary); padding-left: 10px; }
        label { display: block; font-weight: 500; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
        
        input[type="text"], input[type="number"], select, textarea { 
            width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; background-color: #F9FAFB;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); background-color: #FFF; box-shadow: 0 0 0 3px rgba(0, 141, 98, 0.1); }

        .flex-inputs { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .flex-inputs > * { flex: 1; margin-bottom: 0; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;}
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px;}

        .input-block { background-color: #F9FAFB; border: 1px solid var(--border); padding: 16px; border-radius: 8px; margin-bottom: 12px; }
        .sub-label { font-size: 0.8rem; color: var(--primary); margin: 8px 0 4px 0; display: block; font-weight: 700;}

        button { font-family: inherit; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
        .btn-get { background-color: var(--primary); color: white; padding: 8px 16px; flex: none; width: auto;}
        .btn-get:hover { background-color: var(--primary-hover); }
        .btn-add { background-color: #E5E7EB; color: var(--text-main); padding: 8px 16px; font-size: 0.85rem; width: 100%; margin-bottom: 8px;}
        .btn-add:hover { background-color: #D1D5DB; }
        .btn-generate { background-color: var(--primary); color: white; padding: 16px; font-size: 1.1rem; width: 100%; margin-top: 24px; box-shadow: 0 4px 6px rgba(0, 141, 98, 0.2); }
        .btn-generate:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-copy { background-color: #06C755; color: white; padding: 16px; font-size: 1.1rem; width: 100%; margin-top: 16px; }
        .btn-copy:hover { background-color: #05A546; }

        #output-text { height: 750px; font-family: 'Courier New', monospace; resize: none; background-color: #F9FAFB; font-size: 13px; line-height: 1.6; padding: 16px; }
        
        /* 写真アップロード周りのスタイル */
        .photo-area { border: 2px dashed var(--border); padding: 16px; text-align: center; border-radius: 8px; background: #fff; margin-bottom: 12px;}
        .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; justify-content: center;}
        .photo-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ccc; }
        .note { font-size: 0.75rem; color: #E45E20; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card form-section">
        <h2>📝 連絡事項 入力フォーム</h2>

        <div class="section-title">① 明日の天気と気温</div>
        <div class="flex-inputs">
            <select id="area-select" onchange="saveSettings()">
                <option value="130000">東京都</option>
                <option value="230000" selected>愛知県</option>
                <option value="270000">大阪府</option>
                <option value="400000">福岡県</option>
                </select>
            <button type="button" class="btn-get" onclick="fetchWeather()">自動取得</button>
        </div>
        <div class="flex-inputs">
            <input type="text" id="weather-input" placeholder="天気（例: 晴れのち雨）">
            <input type="text" id="temp-input" placeholder="気温（例: 最高28℃ / 最低20℃）">
        </div>

        <div class="section-title">② 地区実績 / ③ サブ実績</div>
        <label>地区平均（売上 / 客数 / 前年比）</label>
        <div class="grid-3">
            <input type="number" id="dist-sales" placeholder="売上(千円)">
            <input type="number" id="dist-cust" placeholder="客数(人)">
            <input type="number" id="dist-yoy" placeholder="前年比(%)">
        </div>
        <label>サブ平均（売上 / 客数 / 前年比）</label>
        <div class="grid-3">
            <input type="number" id="sub-sales" placeholder="売上(千円)">
            <input type="number" id="sub-cust" placeholder="客数(人)">
            <input type="number" id="sub-yoy" placeholder="前年比(%)">
        </div>

        <div class="section-title">④ 新商品動向</div>
        <div class="photo-area">
            <label style="margin:0;">📸 商品画像の準備（最大4枚）</label>
            <input type="file" id="photo-upload" accept="image/*" multiple onchange="previewPhotos()" style="margin-top:8px;">
            <div class="note">※画像はLINEの仕様上、文面と一緒に自動コピーできません。保存した画像をLINEで別途送信してください。</div>
            <div class="photo-preview" id="photo-preview-container"></div>
        </div>

        <div id="new-products-container">
            <div class="input-block product-block">
                <input type="text" class="p-name" placeholder="商品名" style="margin-bottom:8px; font-weight:bold;">
                <div class="flex-inputs">
                    <input type="number" class="p-deliv" placeholder="納品数">
                    <input type="number" class="p-sales" placeholder="販売数">
                    <select class="p-rate-type" style="flex: 0.8;">
                        <option value="欠品率">欠品率</option>
                        <option value="導入率">導入率</option>
                    </select>
                    <input type="number" class="p-rate-val" placeholder="%" style="flex: 0.6;">
                </div>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addNewProduct()">＋ 新商品を追加</button>

        <span class="sub-label">▼ 導入確認単品</span>
        <div id="intro-items-container">
            <div class="flex-inputs intro-block">
                <input type="text" class="i-name" placeholder="商品名" style="flex: 2;">
                <input type="text" class="i-code" placeholder="商品コード(6桁)" maxlength="6">
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addIntroItem()">＋ 確認単品を追加</button>


        <div class="section-title">⑤ セール販売状況</div>
        <div id="sale-container">
            <div class="input-block sale-block">
                <input type="text" class="sl-name" placeholder="セール名（例: おにぎり100円セール）" style="margin-bottom:8px; font-weight:bold;">
                <label>地区平均（販売数 / 金額 / 前年比）</label>
                <div class="grid-3">
                    <input type="number" class="sl-d-qty" placeholder="販売数(個)">
                    <input type="number" class="sl-d-amt" placeholder="金額(円)">
                    <input type="number" class="sl-d-yoy" placeholder="前年比(%)">
                </div>
                <label>サブ平均（販売数 / 金額 / 前年比）</label>
                <div class="grid-3">
                    <input type="number" class="sl-s-qty" placeholder="販売数(個)">
                    <input type="number" class="sl-s-amt" placeholder="金額(円)">
                    <input type="number" class="sl-s-yoy" placeholder="前年比(%)">
                </div>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addSale()">＋ セールを追加</button>

        <div class="section-title">⑥ 分類動向</div>
        <div id="category-container">
            <div class="input-block category-block">
                <input type="text" class="c-name" placeholder="分類名（例: 調理麺）" style="margin-bottom:8px; font-weight:bold;">
                <label>地区平均</label>
                <div class="grid-4">
                    <input type="number" class="c-deliv" placeholder="納品数">
                    <input type="number" class="c-sales" placeholder="販売数">
                    <input type="number" class="c-yoy" placeholder="前年比(%)">
                    <input type="number" class="c-oos" placeholder="欠品率(%)">
                </div>
                <textarea class="c-comment" rows="2" placeholder="コメント（例: 夕夜間の品揃えが不足気味です）"></textarea>
            </div>
        </div>
        <button type="button" class="btn-add" onclick="addCategory()">＋ 分類を追加</button>

        <div class="section-title">⑦ 発注確認事項</div>
        <textarea id="order-notes" rows="4" placeholder="発注に関する確認事項を入力してください"></textarea>

        <div class="section-title">⑧ その他・確認事項</div>
        <textarea id="other-notes" rows="4" placeholder="その他の共有事項を入力してください"></textarea>

        <button type="button" class="btn-generate" onclick="generateText()">プレビューを作成 ✨</button>
    </div>

    <div class="card preview-section">
        <h2>📱 LINEプレビュー</h2>
        <textarea id="output-text" readonly placeholder="「プレビューを作成」ボタンを押すと、文章が生成されます。"></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">LINE用にテキストをコピー</button>
    </div>
</div>

<script>
    // 初期設定読み込み
    window.onload = function() {
        const savedArea = localStorage.getItem('selectedArea');
        if (savedArea) document.getElementById('area-select').value = savedArea;
    };
    function saveSettings() {
        localStorage.setItem('selectedArea', document.getElementById('area-select').value);
    }

    // 写真プレビュー機能
    function previewPhotos() {
        const input = document.getElementById('photo-upload');
        const container = document.getElementById('photo-preview-container');
        container.innerHTML = '';
        
        if (input.files.length > 4) {
            alert('選択できる画像は最大4枚までです。');
            input.value = ''; // リセット
            return;
        }
        
        for (let i = 0; i < input.files.length; i++) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                container.appendChild(img);
            }
            reader.readAsDataURL(input.files[i]);
        }
    }

    // 天気と気温の取得（最低気温の取得ロジック改善）
    async function fetchWeather() {
        const btn = document.querySelector('.btn-get');
        const originalText = btn.innerText;
        btn.innerText = '取得中...';
        
        const areaCode = document.getElementById('area-select').value;
        const url = `https://www.jma.go.jp/bosai/forecast/data/forecast/${areaCode}.json`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // 天気
            const weathers = data[0].timeSeries[0].areas[0].weathers;
            const targetWeather = weathers.length > 1 ? weathers[1] : weathers[0];
            document.getElementById('weather-input').value = targetWeather.replace(/　/g, ' ');

            // 気温（週間予報データから明日の日付を探して確実にとる）
            try {
                const weekTimeDefines = data[1].timeSeries[0].timeDefines;
                const tempsMin = data[1].timeSeries[1].areas[0].tempsMin;
                const tempsMax = data[1].timeSeries[1].areas[0].tempsMax;
                
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowStr = tomorrow.toISOString().split('T')[0];
                
                let foundIndex = -1;
                for (let i = 0; i < weekTimeDefines.length; i++) {
                    if (weekTimeDefines[i].startsWith(tomorrowStr)) {
                        foundIndex = i; break;
                    }
                }
                
                if (foundIndex !== -1 && tempsMin[foundIndex]) {
                    document.getElementById('temp-input').value = `最高${tempsMax[foundIndex]}℃ / 最低${tempsMin[foundIndex]}℃`;
                } else {
                    // 予備ルート
                    const shortTemps = data[0].timeSeries[2].areas[0].temps;
                    if(shortTemps && shortTemps.length >= 2) {
                         document.getElementById('temp-input').value = `最高${shortTemps[shortTemps.length-1]}℃ / 最低${shortTemps[shortTemps.length-2]}℃`;
                    }
                }
            } catch(e) {
                console.warn("気温取得エラー", e);
            }

            btn.innerText = '完了';
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        } catch (error) {
            alert('取得失敗。手入力をお願いします。');
            btn.innerText = originalText;
        }
    }

    // 各項目の追加ボタン処理
    function addNewProduct() {
        const container = document.getElementById('new-products-container');
        const html = `
            <div class="input-block product-block">
                <input type="text" class="p-name" placeholder="商品名" style="margin-bottom:8px; font-weight:bold;">
                <div class="flex-inputs">
                    <input type="number" class="p-deliv" placeholder="納品数">
                    <input type="number" class="p-sales" placeholder="販売数">
                    <select class="p-rate-type" style="flex: 0.8;">
                        <option value="欠品率">欠品率</option>
                        <option value="導入率">導入率</option>
                    </select>
                    <input type="number" class="p-rate-val" placeholder="%" style="flex: 0.6;">
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function addIntroItem() {
        const container = document.getElementById('intro-items-container');
        const html = `
            <div class="flex-inputs intro-block">
                <input type="text" class="i-name" placeholder="商品名" style="flex: 2;">
                <input type="text" class="i-code" placeholder="商品コード(6桁)" maxlength="6">
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function addSale() {
        const container = document.getElementById('sale-container');
        const html = `
            <div class="input-block sale-block">
                <input type="text" class="sl-name" placeholder="セール名" style="margin-bottom:8px; font-weight:bold;">
                <label>地区平均（販売数 / 金額 / 前年比）</label>
                <div class="grid-3">
                    <input type="number" class="sl-d-qty" placeholder="販売数(個)">
                    <input type="number" class="sl-d-amt" placeholder="金額(円)">
                    <input type="number" class="sl-d-yoy" placeholder="前年比(%)">
                </div>
                <label>サブ平均（販売数 / 金額 / 前年比）</label>
                <div class="grid-3">
                    <input type="number" class="sl-s-qty" placeholder="販売数(個)">
                    <input type="number" class="sl-s-amt" placeholder="金額(円)">
                    <input type="number" class="sl-s-yoy" placeholder="前年比(%)">
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function addCategory() {
        const container = document.getElementById('category-container');
        const html = `
            <div class="input-block category-block">
                <input type="text" class="c-name" placeholder="分類名" style="margin-bottom:8px; font-weight:bold;">
                <label>地区平均</label>
                <div class="grid-4">
                    <input type="number" class="c-deliv" placeholder="納品数">
                    <input type="number" class="c-sales" placeholder="販売数">
                    <input type="number" class="c-yoy" placeholder="前年比(%)">
                    <input type="number" class="c-oos" placeholder="欠品率(%)">
                </div>
                <textarea class="c-comment" rows="2" placeholder="コメント"></textarea>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    // テキスト生成
    function generateText() {
        let template = "おはようございます、綿谷です。\n最新の数値と共有事項をお送りします。\n\n";

        // 1. 天候
        const weather = document.getElementById('weather-input').value;
        const temp = document.getElementById('temp-input').value;
        if (weather || temp) {
            template += `■ ① 明日の天候\n[予報] ${weather || ''} ${temp ? '(' + temp + ')' : ''}\n\n`;
        }

        // 2 & 3. 地区・サブ実績
        const distSales = document.getElementById('dist-sales').value;
        const subSales = document.getElementById('sub-sales').value;
        if (distSales || subSales) {
            template += "■ ②・③ 昨日実績\n";
            if (distSales) {
                const c = document.getElementById('dist-cust').value;
                const y = document.getElementById('dist-yoy').value;
                template += `[地区] 売上:${distSales}千円 / 客数:${c || '-'}人 (前年比:${y || '-'}%)\n`;
            }
            if (subSales) {
                const c = document.getElementById('sub-cust').value;
                const y = document.getElementById('sub-yoy').value;
                template += `[サブ] 売上:${subSales}千円 / 客数:${c || '-'}人 (前年比:${y || '-'}%)\n`;
            }
            template += "\n";
        }

        // 4. 新商品動向
        let prodText = "";
        document.querySelectorAll('.product-block').forEach(b => {
            const name = b.querySelector('.p-name').value;
            if (name) {
                const deliv = b.querySelector('.p-deliv').value || "0";
                const sales = b.querySelector('.p-sales').value || "0";
                const rType = b.querySelector('.p-rate-type').value;
                const rVal = b.querySelector('.p-rate-val').value || "0";
                prodText += `・${name}\n  └ 納品:${deliv} / 販売:${sales} / ${rType}:${rVal}%\n`;
            }
        });
        let introText = "";
        document.querySelectorAll('.intro-block').forEach(b => {
            const name = b.querySelector('.i-name').value;
            const code = b.querySelector('.i-code').value;
            if (name) introText += `・${name} (コード: ${code || '未入力'})\n`;
        });
        if (prodText || introText) {
            template += "■ ④ 新商品動向\n" + prodText;
            if (introText) template += "【導入確認単品】\n" + introText;
            template += "\n";
        }

        // 5. セール状況
        let saleText = "";
        document.querySelectorAll('.sale-block').forEach(b => {
            const name = b.querySelector('.sl-name').value;
            if (name) {
                saleText += `[${name}]\n`;
                const dQ = b.querySelector('.sl-d-qty').value || "-";
                const dA = b.querySelector('.sl-d-amt').value || "-";
                const dY = b.querySelector('.sl-d-yoy').value || "-";
                saleText += `・地区: 販売 ${dQ}個 / ${dA}円 (前年比 ${dY}%)\n`;
                
                const sQ = b.querySelector('.sl-s-qty').value || "-";
                const sA = b.querySelector('.sl-s-amt').value || "-";
                const sY = b.querySelector('.sl-s-yoy').value || "-";
                if(sQ !== "-" || sA !== "-") {
                    saleText += `・サブ: 販売 ${sQ}個 / ${sA}円 (前年比 ${sY}%)\n`;
                }
            }
        });
        if (saleText) template += "■ ⑤ セール販売状況\n" + saleText + "\n";

        // 6. 分類動向
        let catText = "";
        document.querySelectorAll('.category-block').forEach(b => {
            const name = b.querySelector('.c-name').value;
            if (name) {
                const deliv = b.querySelector('.c-deliv').value || "0";
                const sales = b.querySelector('.c-sales').value || "0";
                const yoy = b.querySelector('.c-yoy').value || "-";
                const oos = b.querySelector('.c-oos').value || "-";
                const cmt = b.querySelector('.c-comment').value;
                
                catText += `[${name}] 地区平均\n・納品:${deliv} / 販売:${sales} (前年比:${yoy}%) 欠品率:${oos}%\n`;
                if (cmt) catText += `💡 ${cmt}\n`;
            }
        });
        if (catText) template += "■ ⑥ 分類動向\n" + catText + "\n";

        // 7. 発注確認
        const orderNotes = document.getElementById('order-notes').value;
        if (orderNotes) template += "■ ⑦ 発注確認事項\n" + orderNotes + "\n\n";

        // 8. その他
        const otherNotes = document.getElementById('other-notes').value;
        if (otherNotes) template += "■ ⑧ その他・確認事項\n" + otherNotes + "\n\n";

        template += "本日もよろしくお願いいたします！";
        document.getElementById('output-text').value = template;
    }

    function copyToClipboard() {
        const output = document.getElementById('output-text');
        if (!output.value) { alert('プレビューを作成してください。'); return; }
        output.select();
        document.execCommand('copy');
        alert('テキストをコピーしました。画像がある場合は、別途LINEに添付してください。');
    }
</script>

</body>
</html>
